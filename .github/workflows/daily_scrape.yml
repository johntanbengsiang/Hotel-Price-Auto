name: Daily Hotel Price Scraper

on:
  schedule:
    # Runs daily at 08:00 Singapore time (00:00 UTC)
    # To change frequency, edit the cron expression:
    #   Once daily at 08:00 SGT:    0 0 * * *
    #   Twice daily (08:00, 20:00): 0 0,12 * * *
    #   Weekdays only at 08:00:     0 0 * * 1-5
    #   Every 6 hours:              0 */6 * * *
    - cron: "0 0 * * *"

  workflow_dispatch:

jobs:
  # Step 1: Read group IDs from Google Sheet so workflow stays in sync
  # with whatever groups you define in the sheet — no yml edits needed
  # when you add a new group.
  read-groups:
    runs-on: ubuntu-latest
    outputs:
      groups: ${{ steps.get-groups.outputs.groups }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gspread
        run: pip install gspread google-auth

      - name: Read group IDs from sheet
        id: get-groups
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          GOOGLE_SHEET_ID:        ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python - << 'EOF'
          import json, os, sys
          import gspread
          from google.oauth2.service_account import Credentials

          creds = Credentials.from_service_account_info(
              json.loads(os.environ["GOOGLE_SERVICE_ACCOUNT"]),
              scopes=[
                  "https://www.googleapis.com/auth/spreadsheets",
                  "https://www.googleapis.com/auth/drive",
              ],
          )
          client = gspread.authorize(creds)
          sheet  = client.open_by_key(os.environ["GOOGLE_SHEET_ID"])
          ws     = sheet.worksheet("Config - Hotels")
          data   = ws.get_all_records()

          # Get unique group_ids in the order they first appear
          seen   = set()
          groups = []
          for row in data:
              g = str(row.get("group_id", "")).strip()
              if g and g not in seen:
                  seen.add(g)
                  groups.append(g)

          if not groups:
              print("❌  No group_ids found in Config - Hotels tab")
              sys.exit(1)

          print(f"Found groups: {groups}")
          # Write to GitHub Actions output
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"groups={json.dumps(groups)}\n")
          EOF

  # Step 2: Run one scraper job per group, all in parallel
  scrape:
    needs: read-groups
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        group_id: ${{ fromJson(needs.read-groups.outputs.groups) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Scrape group ${{ matrix.group_id }}
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          GOOGLE_SHEET_ID:        ${{ secrets.GOOGLE_SHEET_ID }}
        run: python scraper.py ${{ matrix.group_id }}
