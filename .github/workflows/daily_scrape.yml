name: Daily Hotel Price Scraper

on:
  schedule:
    # 08:00 Singapore time daily (UTC+8 = 00:00 UTC)
    - cron: "0 0 * * *"

  # Run manually from the Actions tab whenever you want
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    # No write access needed — we push directly to OneDrive, not the repo
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Debug OneDrive auth
        env:
          ONEDRIVE_CLIENT_ID:      ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_CLIENT_SECRET:  ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          ONEDRIVE_TENANT_ID:      ${{ secrets.ONEDRIVE_TENANT_ID }}
          ONEDRIVE_REFRESH_TOKEN:  ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}
        run: |
          python - <<'EOF'
          import requests, os
          r = requests.post(
              f"https://login.microsoftonline.com/{os.environ['ONEDRIVE_TENANT_ID']}/oauth2/v2.0/token",
              data={
                  "grant_type":    "refresh_token",
                  "client_id":     os.environ["ONEDRIVE_CLIENT_ID"],
                  "client_secret": os.environ["ONEDRIVE_CLIENT_SECRET"],
                  "refresh_token": os.environ["ONEDRIVE_REFRESH_TOKEN"],
                  "scope":         "Files.ReadWrite",
              }
          )
          print("Status:", r.status_code)
          j = r.json()
          print("Error:", j.get("error"))
          print("Description:", j.get("error_description"))
          EOF
          
      - name: Run hotel price scraper
        env:
          CONFIG_JSON:             ${{ secrets.CONFIG_JSON }}
          ONEDRIVE_CLIENT_ID:      ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_CLIENT_SECRET:  ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          ONEDRIVE_TENANT_ID:      ${{ secrets.ONEDRIVE_TENANT_ID }}
          ONEDRIVE_FOLDER:         ${{ secrets.ONEDRIVE_FOLDER }}
          ONEDRIVE_REFRESH_TOKEN:  ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}
        run: python scraper.py

      - name: Upload run log as artifact (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_id }}
          # Playwright screenshots if scraper fails
          path: |
            *.png
          retention-days: 7
          if-no-files-found: ignore
